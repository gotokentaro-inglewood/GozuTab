openapi: "3.0.3"
info:
  title: GozuTab API
  version: "1.0.0"

servers:
  - url: http://localhost:8000

paths:
  /:
    get:
      summary: ユーザー・タブ一覧取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  tabs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tab"

  /users/create:
    post:
      summary: 新規ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "500":
          description: Internal Server Error

  /users/update:
    post:
      summary: プロフィール編集
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                icon_url:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

  /users/delete:
    post:
      summary: アカウント削除
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

  /tabs:
    get:
      summary: タブ譜一覧取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tab"

  /tabs/create:
    post:
      summary: タブ譜の新規投稿
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, title]
              properties:
                user_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tab"
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

  /tabs/update:
    post:
      summary: タブ譜の編集
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

  /tabs/delete:
    post:
      summary: タブ譜の削除
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        icon_url:
          type: string

    Tab:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        artist:
          type: string
        content:
          type: string
        audio_url:
          type: string
        status:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string
